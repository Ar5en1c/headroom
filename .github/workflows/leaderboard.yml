name: leaderboard
on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

concurrency:
  group: leaderboard-ingest
  cancel-in-progress: false

jobs:
  ingest:
    if: contains(github.event.issue.labels.*.name, 'leaderboard')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Validate and store receipt
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python3 leaderboard/ingest.py
      - name: Rebuild leaderboard.json
        run: python3 leaderboard/build.py
      - name: Commit and push
        run: |
          git config user.name "headroom-leaderboard"
          git config user.email "actions@users.noreply.github.com"
          git add community leaderboard.json
          if git diff --cached --quiet; then
            echo "nothing new to commit"
          else
            git commit -m "leaderboard: receipt from issue #${{ github.event.issue.number }}"
            git pull --rebase origin main
            git push origin main
          fi
      - name: Close issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh issue close "${{ github.event.issue.number }}"
          --repo "${{ github.repository }}"
          --comment "Receipt validated and added to the board: https://ar5en1c.github.io/headroom/ (community ceilings section, live after the next Pages deploy). Rows show hardware only; this issue stays as the row's audit trail. Thanks!"
      - name: Explain on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh issue comment "${{ github.event.issue.number }}"
          --repo "${{ github.repository }}"
          --body "Validation failed. Please edit this issue so the form field contains the complete, unmodified JSON from the page's 'copy JSON receipt' button (collector webgpu-page). Editing the issue re-runs the check; details are in the Actions log."
